<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KavinDave.in — Coming Soon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top, #0f2027, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 700px;
            padding: 40px;
            animation: fadeIn 1.5s ease;
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        h1 span {
            color: #00f5ff;
            text-shadow: 0 0 15px rgba(0, 245, 255, 0.6);
        }

        p {
            font-size: 1.1rem;
            color: #cfd8dc;
            margin-bottom: 30px;
        }

        .badge {
            display: inline-block;
            padding: 10px 22px;
            border: 1px solid #00f5ff;
            border-radius: 30px;
            color: #00f5ff;
            font-size: 0.9rem;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #78909c;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 rgba(0,245,255,0.4); }
            50% { box-shadow: 0 0 20px rgba(0,245,255,0.8); }
            100% { box-shadow: 0 0 0 rgba(0,245,255,0.4); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><span>KavinDave</span>.in</h1>
        <p>Building something meaningful.<br>
           This site is currently under development.</p>

        <div class="badge">🚀 Coming Soon</div>

        <footer>
            © 2026 · Crafted with focus & vision
        </footer>
    </div>

</body>
</html>
